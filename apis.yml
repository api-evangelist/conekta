description: Conekta is a Mexico-based payment processor that lets businesses accept credit and debit cards,
  OXXO cash vouchers, SPEI bank transfers, Apple Pay, Google Pay, and Buy Now Pay Later through a single
  PCI-DSS Level 1 certified API. The platform serves the Mexican market with Spanish-language documentation,
  CNBV-aligned compliance, and full Orders, Charges, Customers, Subscriptions, Payment Links, Antifraud,
  Webhooks, Payouts, and Balances resources. Conekta publishes its OpenAPI 3.1 specification publicly under
  MIT license, ships official SDKs for PHP, Node.js, Python, Ruby, .NET, and Java, and offers mobile
  components for Android, iOS, Flutter, and React Native plus plugins for major e-commerce platforms.
