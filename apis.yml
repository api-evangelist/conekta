  description: Conekta's REST API for accepting online payments in Mexico — credit and debit cards (Visa,
    Mastercard, Amex), OXXO cash vouchers, SPEI bank transfers, Apple Pay, Google Pay, and Buy Now Pay Later.
    The 2.2.0 API covers Orders, Charges, Customers, Plans, Subscriptions, Payment Links, Webhooks, Tokens,
    Payment Methods, Antifraud whitelists/blacklists, Payout Orders, Transfers, Balances, Events, and Logs,
    secured with bearer auth and an Accept-Language header for localized Spanish-language responses.
