components:
  schemas:
    details_error:
      properties:
        code:
          example: conekta.errors.authentication.missing_key
          type: string
        param:
          type: string
          nullable: true
        message:
          example: Acceso no autorizado.
          type: string
        debug_message:
          example: Please include your access key in your request.
          type: string
      title: details_error
    webhook_request:
      description: a webhook
      properties:
        url:
          description: Here you must place the URL of your Webhook remember that you must program what you will do with the events received. Also do not forget to handle the HTTPS protocol for greater security.
          example: https://webhook.site/89277eaa-a8e4-4306-8dc5-f55c80703dc8
          format: url
          pattern: ^(?!.*(localhost|127\.0\.0\.1)).*$
          type: string
        subscribed_events:
          description: events that will be sent to the webhook
          example: customer.created
          items:
            type: string
          type: array
      required:
      - url
      title: webhook_request
    update_webhook:
      description: an updated webhook
      properties:
        url:
          description: Here you must place the URL of your Webhook remember that you must program what you will do with the events received. Also do not forget to handle the HTTPS protocol for greater security.
          example: https://webhook.site/89277eaa-a8e4-4306-8dc5-f55c80703dc8
          format: url
          pattern: ^(?!.*(localhost|127\.0\.0\.1)).*$
          type: string
        subscribed_events:
          description: events that will be sent to the webhook
          example: customer.created
          items:
            type: string
          type: array
        active:
          description: whether the webhook is active or not
          example: true
          type: boolean
      title: update_webhook
    error:
      allOf:
      - properties:
          details:
            items:
              $ref: '#/components/schemas/details_error'
            type: array
      - properties:
          log_id:
            description: log id
            example: 507f1f77bcf86cd799439011
            type: string
            nullable: true
          type:
            example: authentication_error
            type: string
          object:
            example: error
            type: string
      description: err model
      title: error
    get_webhooks_response:
      allOf:
      - description: pagination metadata
        properties:
          has_more:
            description: Indicates if there are more pages to be requested
            example: false
            type: boolean
          object:
            description: Object type, in this case is list
            example: list
            type: string
        required:
        - has_more
        - object
        title: pagination metadata
      - description: page metadata
        properties:
          next_page_url:
            description: URL of the next page.
            example: https://api.conekta.io/resources?limit=10&next=chrg_1
            type: string
            nullable: true
          previous_page_url:
            description: Url of the previous page.
            example: https://api.conekta.io/resources?limit=10&previous=chrg_1
            type: string
            nullable: true
        title: page metadata
      - properties:
          data:
            items:
              $ref: '#/components/schemas/webhook_response'
            type: array
      title: get_webhooks_response
    webhook_response:
      description: webhooks model
      properties:
        id:
          description: id of the webhook
          example: 6307a60c41de27127515a575
          type: string
        description:
          description: A name or brief explanation of what this webhook is used for
          example: Server payments processor
          type: string
        livemode:
          description: Indicates if the webhook is in production
          example: true
          type: boolean
        active:
          description: Indicates if the webhook is actived or not
          example: true
          type: boolean
        object:
          description: Object name, value is 'webhook'
          example: event
          type: string
        status:
          description: Indicates if the webhook is ready to receive events or failing
          example: listening
          type: string
        subscribed_events:
          description: lists the events that will be sent to the webhook
          example:
          - charge.created
          - charge.paid
          - charge.under_fraud_review
          - charge.fraudulent
          - charge.refunded
          - charge.preauthorized
          - charge.declined
          - charge.canceled
          - charge.reversed
          - charge.pending_confirmation
          items:
            type: string
          type: array
        url:
          description: url or endpoint of the webhook
          example: https://username:password@mockoon.conekta.io/payments-api/cash/merchant_approval
          type: string
      title: webhook_response
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
