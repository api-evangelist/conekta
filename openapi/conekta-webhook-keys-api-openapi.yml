          description: Indicates if the webhook key is active
          example: true
          type: boolean
      title: webhook_key_request
    webhook_key_update_request:
      properties:
        active:
          default: false
          description: Indicates if the webhook key is active
          example: false
          type: boolean
      title: webhook_key_update_request
    error:
