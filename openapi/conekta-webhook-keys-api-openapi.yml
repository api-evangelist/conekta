components:
  schemas:
    webhook_key_response:
      description: webhook keys model
      properties:
        id:
          description: Unique identifier of the webhook key
          example: 62730ba6fb7dfd6a712f118e
          type: string
        active:
          description: Indicates if the webhook key is active
          example: true
          type: boolean
        created_at:
          description: Unix timestamp in seconds with the creation date of the webhook key
          example: 1577836800
          format: int64
          type: integer
        deactivated_at:
          description: Unix timestamp in seconds with the deactivation date of the webhook key
          format: int64
          type: integer
          nullable: true
        public_key:
          description: Public key to be used in the webhook
          example: '-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqULpUc6D6mSAq5a0yLY/\noOjd1mWm6q+QI8y/FI4STr2F+XgKeNnMxSqnyFrHtKQ/ut4Zi45WFnJLfEQL7aW5\n67yE2dWyo6GaL7yZUfLC0Y3sHPGzaGtvDF36ISW7LliYNoMiA3Bx5/1Sr0G23pGW\n0Mp8IO1Nlz0sJWuU/d7zCz/UN6cl9g/BP4eaQ7deS56YuWcj5sTlwqFTlwN12kpA\nIzMZ7gnvYQnZTpPny5lben6QEuxTvZcPApcyOweiESjMnXfkfWOyuYtgMrbsU6oL\nA6sWa6j0pePW7AYeBqB4tyAlenkCSqzHg8bMk5Bm7hiT6I9Pls774lJbnOYmmuNE\n8QIDAQAB\n-----END PUBLIC KEY-----\n'
          type: string
        livemode:
          description: Indicates if the webhook key is in live mode
          example: false
          type: boolean
        object:
          description: Object name, value is webhook_key
          example: webhook_key
          type: string
      title: webhook_key_response
    details_error:
      properties:
        code:
          example: conekta.errors.authentication.missing_key
          type: string
        param:
          type: string
          nullable: true
        message:
          example: Acceso no autorizado.
          type: string
        debug_message:
          example: Please include your access key in your request.
          type: string
      title: details_error
    webhook_key_delete_response:
      description: webhook keys model
      properties:
        active:
          description: Indicates if the webhook key is active
          example: true
          type: boolean
        created_at:
          description: Unix timestamp in seconds with the creation date of the webhook key
          example: 1577836800
          format: int64
          type: integer
        deleted:
          description: Indicates if the webhook key is deleted
          example: true
          type: boolean
        id:
          description: Unique identifier of the webhook key
          example: 62730ba6fb7dfd6a712f118e
          type: string
        livemode:
          description: Indicates if the webhook key is in live mode
          example: false
          type: boolean
        object:
          description: Object name, value is webhook_key
          example: webhook_key
          type: string
      title: webhook_key_delete_response
    webhook_key_create_response:
      description: webhook keys model
      properties:
        active:
          description: Indicates if the webhook key is active
          example: true
          type: boolean
        created_at:
          description: Unix timestamp in seconds with the creation date of the webhook key
          example: 1577836800
          format: int64
          type: integer
        id:
          description: Unique identifier of the webhook key
          example: 62730ba6fb7dfd6a712f118e
          type: string
        livemode:
          description: Indicates if the webhook key is in live mode
          example: false
          type: boolean
        object:
          description: Object name, value is webhook_key
          example: webhook_key
          type: string
        public_key:
          description: Public key to be used in the webhook
          example: '-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqULpUc6D6mSAq5a0yLY/\noOjd1mWm6q+QI8y/FI4STr2F+XgKeNnMxSqnyFrHtKQ/ut4Zi45WFnJLfEQL7aW5\n67yE2dWyo6GaL7yZUfLC0Y3sHPGzaGtvDF36ISW7LliYNoMiA3Bx5/1Sr0G23pGW\n0Mp8IO1Nlz0sJWuU/d7zCz/UN6cl9g/BP4eaQ7deS56YuWcj5sTlwqFTlwN12kpA\nIzMZ7gnvYQnZTpPny5lben6QEuxTvZcPApcyOweiESjMnXfkfWOyuYtgMrbsU6oL\nA6sWa6j0pePW7AYeBqB4tyAlenkCSqzHg8bMk5Bm7hiT6I9Pls774lJbnOYmmuNE\n8QIDAQAB\n-----END PUBLIC KEY-----\n'
