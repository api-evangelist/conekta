          exp_month:
            description: Card expiration month
            example: '12'
            maxLength: 2
            minLength: 2
            type: string
          exp_year:
            description: Card expiration year
            example: '2025'
            maxLength: 4
            minLength: 4
            type: string
          name:
            description: Cardholder name
            example: John Doe
            type: string
          number:
            description: Card number
            example: '4242424242424242'
