          type:
            description: Type of the payment method
            example: pay_by_bank
            type: string
        required:
        - product_type
        - type
      title: payment_method_pbb_request
    discount_lines_data_response:
      allOf:
      - allOf:
        - description: List of discounts that apply to the order.
          properties:
            amount:
              description: The amount to be deducted from the total sum of all payments, in cents.
              example: 500
