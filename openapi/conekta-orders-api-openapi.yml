        name:
          description: Name of the fiscal entity
          example: Conekta Inc
          type: string
          nullable: true
        phone:
          description: Phone of the fiscal entity
          example: '+525511223344'
          type: string
        tax_id:
          description: Tax ID of the fiscal entity
          example: AAA010101AAA
          type: string
          nullable: true
      required:
      - address
      title: order_fiscal_entity_request
    order_checkout_request:
      description: '[Checkout](https://developers.conekta.com/v2.2.0/reference/payment-link) details

        '
      properties:
        allowed_payment_methods:
          description: Are the payment methods available for this link. For subscriptions, only 'card' is allowed due to the recurring nature of the payments.
          example:
          - cash
          - card
          - bank_transfer
          - bnpl
          - pay_by_bank
          items:
            enum:
            - cash
            - card
            - bank_transfer
            - bnpl
            - pay_by_bank
            type: string
          type: array
        exclude_card_networks:
          description: List of card networks to exclude from the checkout. This field is only applicable for card payments.
          example:
          - visa
          - amex
          items:
            enum:
            - visa
            - mastercard
            - amex
            type: string
          title: checkout_request_exclude_card_networks
          type: array
        plan_ids:
          description: List of plan IDs that will be available for subscription. This field is required for subscription payments.
          example:
          - plan_123
          - plan_456
          items:
            type: string
          type: array
        expires_at:
          description: "It is the time when the link will expire. \nIt is expressed in seconds since the Unix epoch. The valid range is from 5 minutes to 365 days from the creation date.\n"
          format: int64
          minimum: 1
          type: integer
        failure_url:
          description: Redirection url back to the site in case of failed payment, applies only to HostedPayment.
          example: https://www.mysite.com/failure
          format: uri
          type: string
        monthly_installments_enabled:
          example: false
          type: boolean
        monthly_installments_options:
          example:
          - 3
          - 6
          - 12
          items:
            format: int8
            type: integer
          type: array
        max_failed_retries:
          description: Number of retries allowed before the checkout is marked as failed
          example: 3
          format: int8
          type: integer
        name:
          description: Reason for payment
          type: string
        on_demand_enabled:
          example: true
          type: boolean
        redirection_time:
          description: number of seconds to wait before redirecting to the success_url
          example: 10
          format: int8
          type: integer
        success_url:
          description: Redirection url back to the site in case of successful payment, applies only to HostedPayment
          example: https://www.mysite.com/success
          format: uri
          type: string
        type:
          description: Required. This field represents the type of checkout, which determines the user experience during the payment process. 'HostedPayment' will redirect the customer to a Conekta-hosted page to complete the payment, while 'Integration' allows the payment process to be handled entirely on your site using Conekta's APIs and SDKs.
          enum:
          - Integration
          - HostedPayment
          type: string
      required:
      - allowed_payment_methods
      title: order_checkout_request
    order_response_customer_info:
      allOf:
      - properties:
          object:
            example: customer_info
            type: string
      - properties:
          customer_custom_reference:
            description: Custom reference
            example: custom_reference
            type: string
            nullable: true
          name:
            example: DevTest
            type: string
          email:
            example: test@conekta.com
            format: email
            type: string
          phone:
            example: '5522997233'
            type: string
          corporate:
            default: false
            type: boolean
          object:
            example: customer_info
            type: string
        title: order_customer_info_response
      - properties:
          customer_id:
            example: cus_23874283647
            type: string
        title: customer_info_response
    customer_shipping_contacts_request:
      description: '[Shipping](https://developers.conekta.com/v2.2.0/reference/createcustomershippingcontacts)

        details, required in case of sending a shipping. If we do not receive a shipping_contact on the order, the default shipping_contact of the customer will be used.'
      properties:
        phone:
          description: Phone contact
          example: '+525511223344'
          type: string
        receiver:
          description: Name of the person who will receive the order
          example: Marvin Fuller
          type: string
        between_streets:
          description: The street names between which the order will be delivered.
          example: Ackerman Crescent
          type: string
        address:
          $ref: '#/components/schemas/customer_shipping_contacts_request_address'
        parent_id:
          type: string
        default:
          type: boolean
          nullable: true
        deleted:
          type: boolean
          nullable: true
        metadata:
          additionalProperties: true
          description: Metadata associated with the shipping contact
          maxProperties: 100
          type: object
      required:
      - address
      title: customer_shipping_contacts_request
    payment_method_pbb_payment:
      allOf:
      - properties:
          type:
            type: string
          object:
            example: payment_source
            type: string
        required:
        - object
      - description: use for pbb payment responses
        properties:
          deep_link:
            description: Deep link for the payment, use for mobile apps/flows
            example: https://mgm.bbva.mx/WA3b/pbb?AGREEMENT=002484374&AMOUNT=1&CONCEPT=PagoDirecto&CURRENCY=MXN&REFERENCE=22277523174328893295
            type: string
          expires_at:
            description: Expiration date of the charge
            example: 1683053729
            format: int64
            minimum: 0
            type: integer
          product_type:
            description: Product type of the charge
            type: string
          redirect_url:
            description: URL to redirect the customer to complete the payment
            example: https://example.com/redirect
            type: string
          reference:
            description: Reference for the payment
