security:
- bearerAuth: []
tags:
- name: Orders
paths:
  /orders:
    get:
      description: Get order details in the form of a list
      operationId: getOrders
      parameters:
      - description: Use for knowing which language to use
        examples:
          es:
            summary: for spanish request/response
            value: es
          en:
            summary: for english request/response
            value: en
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: es
          enum:
          - es
          - en
          type: string
        style: simple
      - description: In the case of a holding company, the company id of the child company to which will process the request.
        example: 6441b6376b60c3a638da80af
        explode: false
        in: header
        name: X-Child-Company-Id
        required: false
        schema:
          type: string
        style: simple
      - description: The numbers of items to return, the maximum value is 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          format: int32
          maximum: 250
          minimum: 1
          type: integer
        style: form
      - description: General order search, e.g. by mail, reference etc.
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: next page
        explode: true
        in: query
        name: next
        required: false
        schema:
          type: string
        style: form
      - description: previous page
        explode: true
        in: query
        name: previous
        required: false
        schema:
          type: string
        style: form
      - description: Filters by order status
        explode: true
        in: query
        name: payment_status
        required: false
        schema:
          example: paid
          type: string
        style: form
      - description: Filters by last payment info status
        explode: true
        in: query
        name: last_payment_info.status
        required: false
        schema:
          example: pending_payment
          type: string
        style: form
      - description: created equal to
        explode: true
        in: query
        name: created_at
        required: false
        schema:
          example: 1612137600
          format: int64
          type: integer
        style: form
      - description: created at greater than or equal to
        explode: true
        in: query
        name: created_at.gte
        required: false
        schema:
          example: 1612137600
          format: int64
          type: integer
        style: form
      - description: created at less than or equal to
        explode: true
        in: query
        name: created_at.lte
        required: false
        schema:
          example: 1612137600
          format: int64
          type: integer
        style: form
      - description: updated at greater than or equal to
        explode: true
        in: query
        name: updated_at.gte
        required: false
        schema:
          example: 1612137600
          format: int64
          type: integer
        style: form
      - description: updated at less than or equal to
        explode: true
        in: query
        name: updated_at.lte
        required: false
        schema:
          example: 1612137600
          format: int64
          type: integer
        style: form
      responses:
        '200':
          content:
            application/vnd.conekta-v2.2.0+json:
              schema:
                $ref: '#/components/schemas/get_orders_response'
          description: successful operation
        '401':
          content:
            application/vnd.conekta-v2.2.0+json:
              example:
                details:
                - message: Please include your access key in your request.
                  code: conekta.errors.authentication.missing_key
                log_id: 507f1f77bcf86cd799439011
                object: error
                type: authentication_error
              schema:
                $ref: '#/components/schemas/error'
          description: authentication error
        '500':
          content:
            application/vnd.conekta-v2.2.0+json:
              example:
                details:
                - debug_message: There was a runtime error and Conekta engineers have been notified.
                  message: There was a runtime error and Conekta engineers have been notified.
                  code: conekta.errors.api.system.general_failure
                object: error
                type: api_error
                log_id: 641b6f2b3cd9a50001515098
              schema:
                $ref: '#/components/schemas/error'
          description: internal server error
