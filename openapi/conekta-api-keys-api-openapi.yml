components:
  schemas:
    details_error:
      properties:
        code:
          example: conekta.errors.authentication.missing_key
          type: string
        param:
          type: string
          nullable: true
        message:
          example: Acceso no autorizado.
          type: string
        debug_message:
          example: Please include your access key in your request.
          type: string
      title: details_error
    api_key_create_response:
      allOf:
      - properties:
          authentication_token:
            description: It is occupied as a user when authenticated with basic authentication, with a blank password. This value will only appear once, in the request to create a new key. Copy and save it in a safe place.
            example: key_rpHzxufNgjFCdprEEFZRTKi
            type: string
      - description: api keys model
        properties:
          active:
            description: Indicates if the api key is active
            example: true
            type: boolean
          created_at:
            description: Unix timestamp in seconds of when the api key was created
            example: 1684167881
            format: int64
            type: integer
          updated_at:
            description: Unix timestamp in seconds of when the api key was last updated
            example: 1684167923
            format: int64
            type: integer
          deactivated_at:
            description: Unix timestamp in seconds of when the api key was deleted
            format: int64
            type: integer
            nullable: true
          last_used_at:
            description: Unix timestamp in seconds with the api key was used
            format: int64
            type: integer
            nullable: true
          description:
            description: A name or brief explanation of what this api key is used for
            example: online store
            type: string
          id:
            description: Unique identifier of the api key
            example: 64625cc9f3e02c00163f5e4d
            type: string
          livemode:
            description: Indicates if the api key is in production
            example: false
            type: boolean
          object:
            description: Object name, value is 'api_key'
            example: api_key
            type: string
          prefix:
            description: The first few characters of the authentication_token
            example: key_rp
            type: string
          role:
            description: Indicates if the api key is private or public
            example: private
            type: string
        title: api_key_response
      title: api_key_create_response
    api_key_update_request:
      properties:
        active:
          description: Indicates if the webhook key is active
          example: true
          type: boolean
        description:
          description: A name or brief explanation of what this api key is used for
          example: online store
          type: string
      title: api_key_update_request
    get_api_keys_response:
      allOf:
      - description: page metadata
        properties:
          next_page_url:
            description: URL of the next page.
            example: https://api.conekta.io/resources?limit=10&next=chrg_1
            type: string
            nullable: true
          previous_page_url:
            description: Url of the previous page.
            example: https://api.conekta.io/resources?limit=10&previous=chrg_1
            type: string
            nullable: true
        title: page metadata
      - description: pagination metadata
        properties:
          has_more:
            description: Indicates if there are more pages to be requested
            example: false
            type: boolean
          object:
            description: Object type, in this case is list
            example: list
            type: string
        required:
        - has_more
        - object
        title: pagination metadata
      - properties:
          data:
            items:
              $ref: '#/components/schemas/api_key_response'
            type: array
      title: get_api_keys_response
    error:
      allOf:
      - properties:
          details:
            items:
              $ref: '#/components/schemas/details_error'
            type: array
      - properties:
          log_id:
            description: log id
            example: 507f1f77bcf86cd799439011
            type: string
            nullable: true
          type:
            example: authentication_error
            type: string
          object:
            example: error
            type: string
      description: err model
      title: error
    delete_api_keys_response:
      allOf:
      - description: api keys model
        properties:
          active:
            description: Indicates if the api key is active
            example: true
            type: boolean
          created_at:
            description: Unix timestamp in seconds of when the api key was created
            example: 1684167881
            format: int64
            type: integer
          description:
            description: A name or brief explanation of what this api key is used for
            example: online store
            type: string
          livemode:
            description: Indicates if the api key is in production
            example: false
            type: boolean
          prefix:
            description: The first few characters of the authentication_token
            example: key_rp
            type: string
          id:
            description: Unique identifier of the api key
            example: 64625cc9f3e02c00163f5e4d
            type: string
          object:
            description: Object name, value is 'api_key'
            example: api_key
            type: string
          last_used_at:
            description: Unix timestamp in seconds with the api key was used
            format: int64
            type: integer
            nullable: true
          role:
            description: Indicates if the api key is private or public
            example: private
            type: string
        title: api_key_response_delete
      - properties:
          deleted:
            example: true
            type: boolean
      title: delete_api_keys_response
    api_key_response:
      description: api keys model
      properties:
        active:
          description: Indicates if the api key is active
          example: true
          type: boolean
        created_at:
          description: Unix timestamp in seconds of when the api key was created
          example: 1684167881
          format: int64
          type: integer
        updated_at:
          description: Unix timestamp in seconds of when the api key was last updated
          example: 1684167923
          format: int64
          type: integer
        deactivated_at:
          description: Unix timestamp in seconds of when the api key was deleted
          format: int64
          type: integer
          nullable: true
        last_used_at:
          description: Unix timestamp in seconds with the api key was used
          format: int64
          type: integer
          nullable: true
        description:
          description: A name or brief explanation of what this api key is used for
          example: online store
          type: string
        id:
          description: Unique identifier of the api key
          example: 64625cc9f3e02c00163f5e4d
          type: string
        livemode:
          description: Indicates if the api key is in production
          example: false
          type: boolean
        object:
          description: Object name, value is 'api_key'
          example: api_key
          type: string
        prefix:
          description: The first few characters of the authentication_token
          example: key_rp
          type: string
        role:
          description: Indicates if the api key is private or public
          example: private
          type: string
      title: api_key_response
    api_key_request:
      properties:
        description:
          description: A name or brief explanation of what this api key is used for
          example: online store
          type: string
        role:
          example: private
          type: string
          descripción: Indicates if the api key is private or public
      required:
      - role
      title: api_key_request
      name: api_key_request
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
