        status:
          example: 200
          type: string
        updated_at:
          example: 2022-08-25 16:40:44.887000+00:00
          type: string
        url:
          example: /filter_resource
          type: string
        user_account_id:
          example: 5a0b7001edbb6e1725b0b2c6
          type: string
        version:
          example: 2.2.0
          type: string
      title: logs_response_data
