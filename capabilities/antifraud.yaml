naftiko: 1.0.0-alpha2
info:
  label: Conekta Antifraud API
  description: Manage merchant-level antifraud whitelists and blacklists. Whitelists trust card BINs,
    emails, or other attributes; blacklists block them automatically.
  tags:
  - Conekta
  - Payments
  - Antifraud
  - Risk
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: antifraud
    baseUri: https://api.conekta.io
    description: Conekta Antifraud business capability — manage whitelist and blacklist rules.
    resources:
    - name: whitelists
      path: /antifraud/whitelists
      operations:
      - name: listWhitelistRules
        method: GET
        description: List antifraud whitelist rules.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createWhitelistRule
        method: POST
        description: Add a whitelist rule that bypasses antifraud checks.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: whitelistRule
      path: /antifraud/whitelists/{id}
      operations:
      - name: deleteWhitelistRule
        method: DELETE
        description: Remove a whitelist rule.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: blacklists
      path: /antifraud/blacklists
      operations:
      - name: listBlacklistRules
        method: GET
        description: List antifraud blacklist rules.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createBlacklistRule
        method: POST
        description: Add a blacklist rule that automatically rejects matching transactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: blacklistRule
      path: /antifraud/blacklists/{id}
      operations:
      - name: deleteBlacklistRule
        method: DELETE
        description: Remove a blacklist rule.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
