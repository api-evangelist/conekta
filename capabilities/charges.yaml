naftiko: 1.0.0-alpha2
info:
  label: Conekta Charges API
  description: Add and update Charges on existing Orders. Each Charge represents a single payment attempt
    using a specific payment method (card, OXXO cash, SPEI, BNPL).
  tags:
  - Conekta
  - Payments
  - Charges
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: charges
    baseUri: https://api.conekta.io
    description: Conekta Charges business capability — create and update charges against orders.
    resources:
    - name: charges
      path: /charges
      operations:
      - name: listCharges
        method: GET
        description: List all charges with optional date and status filters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: search
          in: query
          type: string
    - name: charge
      path: /charges/{id}
      operations:
      - name: updateCharge
        method: PUT
        description: Update a charge (e.g., capture or void a pre-auth).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: orderCharges
      path: /orders/{id}/charges
      operations:
      - name: addOrderCharge
        method: POST
        description: Add a charge to an existing order using a payment source.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
