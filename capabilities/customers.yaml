naftiko: 1.0.0-alpha2
info:
  label: Conekta Customers API
  description: Manage customer profiles, their payment sources, shipping contacts, and subscriptions.
  tags:
  - Conekta
  - Payments
  - Customers
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: customers
    baseUri: https://api.conekta.io
    description: Conekta Customers business capability — CRUD customers and their nested resources.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: listCustomers
        method: GET
        description: List customers with pagination and search.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: search
          in: query
          type: string
      - name: createCustomer
        method: POST
        description: Create a customer with optional payment sources and shipping contacts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: customer
      path: /customers/{id}
      operations:
      - name: getCustomer
        method: GET
        description: Retrieve a customer by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updateCustomer
        method: PUT
        description: Update customer attributes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deleteCustomer
        method: DELETE
        description: Delete a customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: paymentSources
      path: /customers/{id}/payment_sources
      operations:
      - name: createPaymentSource
        method: POST
        description: Attach a tokenized payment source (card) to a customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: shippingContacts
      path: /customers/{id}/shipping_contacts
      operations:
      - name: createShippingContact
        method: POST
        description: Add a shipping address to a customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
