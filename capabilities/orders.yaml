naftiko: 1.0.0-alpha2
info:
  label: Conekta Orders API
  description: Create, retrieve, list, and update Conekta Orders. An Order is the top-level object that
    groups line items, charges, shipping contacts, and tax/discount lines for a single transaction.
  tags:
  - Conekta
  - Payments
  - Orders
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: orders
    baseUri: https://api.conekta.io
    description: Conekta Orders business capability — create, retrieve, list, and refund orders.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: getOrders
        method: GET
        description: List orders. Supports pagination via next/previous cursors.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: search
          in: query
          type: string
        - name: next
          in: query
          type: string
        - name: previous
          in: query
          type: string
      - name: createOrder
        method: POST
        description: Create a new order with line items, customer info, and optional charges.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: order
      path: /orders/{id}
      operations:
      - name: getOrder
        method: GET
        description: Retrieve a single order by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updateOrder
        method: PUT
        description: Update an order (capture, refund, cancel).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: orderRefund
      path: /orders/{id}/refunds
      operations:
      - name: refundOrder
        method: POST
        description: Refund a paid order, fully or partially.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
