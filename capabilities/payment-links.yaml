naftiko: 1.0.0-alpha2
info:
  label: Conekta Payment Links API
  description: Create and manage hosted Payment Links — shareable URLs that present a Conekta-hosted
    checkout page with one or more payment methods.
  tags:
  - Conekta
  - Payments
  - Payment Links
  - Checkout
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-links
    baseUri: https://api.conekta.io
    description: Conekta Payment Links business capability — hosted checkout URLs.
    resources:
    - name: checkouts
      path: /checkouts
      operations:
      - name: listPaymentLinks
        method: GET
        description: List payment links / hosted checkouts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
      - name: createPaymentLink
        method: POST
        description: Create a new hosted Payment Link with allowed methods and amount.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: checkout
      path: /checkouts/{id}
      operations:
      - name: getPaymentLink
        method: GET
        description: Retrieve a payment link by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: cancelPaymentLink
        method: PUT
        description: Cancel or expire a payment link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: checkoutEmail
      path: /checkouts/{id}/email
      operations:
      - name: emailPaymentLink
        method: POST
        description: Email the payment link to the customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
