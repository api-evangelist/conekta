naftiko: 1.0.0-alpha2
info:
  label: Conekta Subscriptions API
  description: Manage recurring billing via Plans and Subscriptions, including a customer portal for
    end-user self-service.
  tags:
  - Conekta
  - Payments
  - Subscriptions
  - Recurring
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    CONEKTA_API_KEY: CONEKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: subscriptions
    baseUri: https://api.conekta.io
    description: Conekta Subscriptions business capability — plans, subscriptions, and customer portal.
    resources:
    - name: plans
      path: /plans
      operations:
      - name: listPlans
        method: GET
        description: List billing plans.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createPlan
        method: POST
        description: Create a recurring billing plan.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: plan
      path: /plans/{id}
      operations:
      - name: updatePlan
        method: PUT
        description: Update a plan.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: subscription
      path: /customers/{customer_id}/subscription
      operations:
      - name: createSubscription
        method: POST
        description: Create a subscription for a customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: getSubscription
        method: GET
        description: Retrieve a customer subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
      - name: updateSubscription
        method: PUT
        description: Pause, resume, or change a subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.CONEKTA_API_KEY}}'
    defaultHeaders:
      Accept-Language: es
      Accept: application/vnd.conekta-v2.2.0+json
